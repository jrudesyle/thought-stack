<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Indigo background -->
  <rect width="100" height="100" rx="22" fill="#4f46e5"/>
  <!-- Notebook pages (slightly offset for depth) -->
  <rect x="30" y="18" width="44" height="56" rx="4" fill="#c7d2fe" opacity="0.5"/>
  <rect x="27" y="15" width="44" height="56" rx="4" fill="#e0e7ff"/>
  <!-- Ruled lines -->
  <line x1="35" y1="30" x2="63" y2="30" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="38" x2="63" y2="38" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="46" x2="63" y2="46" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="54" x2="55" y2="54" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <!-- Spiral coils -->
  <circle cx="27" cy="28" r="3.5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <circle cx="27" cy="39" r="3.5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <circle cx="27" cy="50" r="3.5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <circle cx="27" cy="61" r="3.5" fill="none" stroke="#818cf8" stroke-width="2"/>
  <!-- Pencil -->
  <g transform="translate(52,52) rotate(45)">
    <rect x="-5" y="-22" width="10" height="34" rx="2" fill="#fbbf24"/>
    <polygon points="-5,12 5,12 0,22" fill="#f59e0b"/>
    <rect x="-5" y="-22" width="10" height="6" rx="2" fill="#9ca3af"/>
    <line x1="-5" y1="-16" x2="5" y2="-16" stroke="#d1d5db" stroke-width="1"/>
  </g>
</svg>
