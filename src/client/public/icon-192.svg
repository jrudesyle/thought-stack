<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="50" y1="28" x2="24" y2="50" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="28" x2="76" y2="50" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="24" y1="50" x2="50" y2="72" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="76" y1="50" x2="50" y2="72" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="24" y1="50" x2="76" y2="50" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="28" x2="50" y2="72" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  <!-- Outer glow halos -->
  <circle cx="50" cy="28" r="11" fill="#6366f1" opacity="0.2"/>
  <circle cx="24" cy="50" r="9" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="76" cy="50" r="9" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="50" cy="72" r="11" fill="#6366f1" opacity="0.2"/>
  <!-- Nodes -->
  <circle cx="50" cy="28" r="8" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="50" cy="28" r="4" fill="#a5b4fc"/>
  <circle cx="24" cy="50" r="7" fill="#7c3aed" filter="url(#glow)"/>
  <circle cx="24" cy="50" r="3.5" fill="#c4b5fd"/>
  <circle cx="76" cy="50" r="7" fill="#7c3aed" filter="url(#glow)"/>
  <circle cx="76" cy="50" r="3.5" fill="#c4b5fd"/>
  <circle cx="50" cy="72" r="8" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="50" cy="72" r="4" fill="#a5b4fc"/>
</svg>
